<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Wireframe Layout</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /*--- আপনার দেওয়া মূল ভেরিয়েবল এবং বেসিক স্টাইল ---*/
        :root { 
            --neon-blue: #00d2ff; 
            --neon-red: #ff0055; 
            --dark-bg: #020617; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        /*--- আপনার ঝুলন্ত মাকড়সা অ্যানিমেশন (অপরিবর্তিত) ---*/
        .hanging-spider {
            position: fixed; top: -50px; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
            animation: swing 4s ease-in-out infinite;
        }
        .web-line { width: 1px; height: 180px; background: rgba(255, 255, 255, 0.4); }
        .spider-icon {
            font-size: 35px; color: #ff0055;
            filter: drop-shadow(0 0 10px #ff0055);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes swing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(40px) rotate(8deg); }
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px #ff0055); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px #ff0055); transform: scale(1.1); }
        }

        /*--- ১. Top Navigation (স্কেচ অনুযায়ী) ---*/
        .top-nav {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; border-bottom: 1px solid rgba(0, 210, 255, 0.1);
        }
        .nav-tabs { display: flex; gap: 15px; }
        .tab-box { width: 50px; height: 15px; border: 1px solid var(--neon-blue); opacity: 0.5; }
        
        /* আপনার ছবির মতো প্রোফাইল গ্লো */
        .profile-small {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
        }

        /*--- ২. Main Layout (Sidebar + Center Content + Right Panel) ---*/
        .layout-body { display: flex; flex: 1; padding: 20px; gap: 20px; }

        /* Left Sidebar (৫টি আইকন বক্স + gaming id লেখা) */
        .left-sidebar { width: 80px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .side-box { width: 45px; height: 45px; border: 1px solid var(--neon-blue); cursor: pointer; transition: 0.3s; }
        .side-box:hover { box-shadow: 0 0 15px var(--neon-blue); transform: scale(1.1); background: rgba(0, 210, 255, 0.1); }
        .gaming-id-text { writing-mode: vertical-rl; text-transform: uppercase; color: var(--neon-blue); font-weight: bold; margin-top: 15px; font-size: 14px; }

        /* Center Content (আপনার কার্ডগুলো এখানে থাকবে) */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; gap: 20px; 
            justify-content: center; align-items: center;
        }

        /* আপনার দেওয়া Dream Card স্টাইল */
        .dream-card {
            width: 100%; max-width: 600px;
            background: rgba(255, 255, 255, 0.03); border-radius: 20px;
            padding: 30px; text-align: center; position: relative; overflow: hidden;
            border: 1px solid rgba(0, 210, 255, 0.2); transition: 0.5s;
        }
        .dream-card:hover { transform: translateY(-5px); box-shadow: 0 0 25px var(--neon-blue); border-color: #fff; }
        .dream-card h2 { font-size: 22px; color: #fff; letter-spacing: 2px; }
        .dream-card p { font-size: 14px; color: var(--neon-blue); opacity: 0.7; }

        /* Right Panel (৩টি বক্স + ভার্টিক্যাল বার) */
        .right-panel { display: flex; gap: 10px; }
        .small-boxes { display: flex; flex-direction: column; gap: 12px; }
        .s-box { width: 40px; height: 40px; border: 1px solid var(--neon-red); }
        .v-bar { width: 25px; height: 100%; border: 1px solid var(--neon-blue); opacity: 0.3; }

    </style>
</head>
<body>

    <!-- আপনার মাকড়সাগুলো ঠিক আগের জায়গায় থাকবে -->
    <div class="hanging-spider" style="left: 10%;"><div class="web-line"></div><i class="fas fa-spider spider-icon"></i></div>
    <div class="hanging-spider" style="right: 15%;"><div class="web-line" style="height: 120px;"></div><i class="fas fa-spider spider-icon"></i></div>

    <!-- ১. উপরের বার (Top Nav) -->
    <header class="top-nav">
        <div style="width: 55px;"></div> 
        <div class="nav-tabs">
            <div class="tab-box"></div><div class="tab-box"></div><div class="tab-box"></div>
        </div>
        <div class="profile-small"></div>
    </header>

    <!-- ২. মেইন লেআউট (স্কেচ অনুযায়ী) -->
    <div class="layout-body">
        <!-- বাম পাশের সাইডবার -->
        <aside class="left-sidebar">
            <div class="side-box"></div><div class="side-box"></div><div class="side-box"></div>
            <div class="side-box"></div><div class="side-box"></div>
            <div class="gaming-id-text">GAMING ID</div>
        </aside>

        <!-- মাঝখানের কন্টেন্ট (আপনার কার্ড) -->
        <main class="main-content">
            <h1 style="color: var(--neon-blue); margin-bottom: 20px;">HEY, IT'S JILAN</h1>
            
            <div class="dream-card">
                <h2>DREAM GAMER</h2>
                <p>Dominating the battlefield with ZERO skills.</p>
            </div>

            <div class="dream-card">
                <h2>SPIDEY SENSE</h2>
                <p>not peter parker.</p>
            </div>
        </main>

        <!-- ডান পাশের প্যানেল -->
        <aside class="right-panel">
            <div class="small-boxes">
                <div class="s-box"></div><div class="s-box"></div><div class="s-box"></div>
            </div>
            <div class="v-bar"></div>
        </aside>
    </div>

</body>
</html>
