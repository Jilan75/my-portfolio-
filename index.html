<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Spidey Dashboard</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root { --spidey-red: #ff0000; --dark-bg: #0b0f1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark-bg); 
            color: white; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /*--- 1. Pure CSS Animated Background (No External Link Needed) ---*/
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #161b22 0%, #0b0f1a 100%);
        }

        /* Floating Red Dots (Spider Eyes Effect) */
        .dot {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--spidey-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--spidey-red);
            animation: move 15s linear infinite;
        }

        @keyframes move {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }

        /*--- 2. UI Elements ---*/
        .gaming-logo {
            position: fixed; top: 20px; left: 20px;
            width: 70px; height: 70px;
            border: 2px solid var(--spidey-red);
            box-shadow: 0 0 15px var(--spidey-red);
            border-radius: 12px; z-index: 1000; overflow: hidden; background: #000;
        }
        .gaming-logo img { width: 100%; height: 100%; object-fit: cover; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .profile-container {
            width: 180px; height: 180px;
            border: 4px solid var(--spidey-red);
            border-radius: 50%; padding: 5px; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: float 4s ease-in-out infinite;
        }
        .profile-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        h1 { font-size: 3.5rem; text-shadow: 0 0 15px var(--spidey-red); }
        h1 span { color: var(--spidey-red); }

        .container { max-width: 1100px; margin: -50px auto 50px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); padding: 40px; border-radius: 25px;
            border: 1px solid rgba(255, 0, 0, 0.2); text-align: center; 
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--spidey-red); }
        .card i { font-size: 50px; color: var(--spidey-red); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="bg-animation" id="bg"></div>

    <div class="gaming-logo">
        <img src="logo.png" alt="Logo">
    </div>

    <section class="hero">
        <div class="profile-container">
            <img src="my-pic.jpg" alt="Jilan">
        </div>
        <h1>Hello, I'm <span>Jilan</span></h1>
        <p style="letter-spacing: 3px; opacity: 0.8;">GAMER | SPIDEY | DEVELOPER</p>
    </section>

    <div class="container">
        <div class="grid">
            <div class="card"><i class="fas fa-spider"></i><h3>Agility</h3><p>Speed & Accuracy.</p></div>
            <div class="card"><i class="fas fa-gamepad"></i><h3>Gaming</h3><p>Pro Skills.</p></div>
            <div class="card"><i class="fas fa-code"></i><h3>Dev</h3><p>Clean Code.</p></div>
        </div>
    </div>

    <script>
        // ব্যাকগ্রাউন্ডে লাল বিন্দুগুলো তৈরি করার স্ক্রিপ্ট
        const bg = document.getElementById('bg');
        for (let i = 0; i < 30; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.animationDelay = Math.random() * 10 + 's';
            dot.style.animationDuration = Math.random() * 5 + 10 + 's';
            bg.appendChild(dot);
        }
    </script>
</body>
</html>
