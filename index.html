<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Digital Profile UI</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --primary-bg: #020617;
            --sidebar-bg: #e2e8f0;
            --accent-blue: #3b82f6;
            --text-main: #1e293b;
            --gradient-main: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main); 
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            position: relative;
        }

        h1, h2, h3, .welcome-text h2 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /*--- ব্যাকগ্রাউন্ড অ্যানিমেশন ---*/
        #animation-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%);
        }
        canvas { display: block; }

        /*--- Sidebar ---*/
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            display: flex; flex-direction: column; padding: 20px;
            border-right: 1px solid rgba(0,0,0,0.05); z-index: 10;
        }
        .profile-section { text-align: center; padding: 20px 0; margin-bottom: 20px; }
        .profile-img {
            width: 70px; height: 70px; border-radius: 50%; background: #fff;
            margin: 0 auto 10px; border: 3px solid var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
        }
        .nav-menu { list-style: none; flex: 1; }
        .nav-item {
            padding: 12px 15px; margin-bottom: 5px; border-radius: 10px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center;
            gap: 12px; color: #475569; font-weight: bold;
        }
        .nav-item:hover, .nav-item.active { background: #fff; color: var(--accent-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /*--- Main Area ---*/
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 10; }
        .welcome-banner {
            background: var(--gradient-main); padding: 25px 40px; border-radius: 20px;
            color: white; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideDown 0.8s ease-out;
        }

        .page { display: none; width: 100%; animation: fadeIn 0.5s ease-in-out forwards; }
        .page.active { display: flex; flex-direction: column; gap: 20px; }

        /* Sub-frames grid */
        .sub-frame-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; width: 100%; }
        
        /* Social Card Style */
        .social-card {
            background: #fff; padding: 30px; border-radius: 15px; text-align: center;
            border: 1px solid var(--accent-blue); transition: 0.4s;
            cursor: pointer; text-decoration: none; color: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .social-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .social-card i { font-size: 40px; margin-bottom: 15px; }
        
        /* Brand Colors */
        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-twitter { color: #1DA1F2; }
        .fa-youtube { color: #FF0000; }

        .back-btn {
            margin-top: 20px; padding: 10px 25px; cursor: pointer;
            background: var(--accent-blue); color: #fff; border: none;
            border-radius: 8px; font-family: 'Orbitron'; font-size: 11px;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="animation-container"><canvas id="particleCanvas"></canvas></div>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-img"><i class="fas fa-user-ninja" style="font-size: 30px; color: var(--accent-blue);"></i></div>
            <h3>Monaemul Jilan</h3>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showPage('home')"><i class="fas fa-th-large"></i> Dashboard</li>
            <li class="nav-item" onclick="showSocial()"><i class="fas fa-share-alt"></i> Social</li>
            <li class="nav-item" onclick="showDetails('Relatives')"><i class="fas fa-heart"></i> Relatives</li>
            <li class="nav-item" onclick="showDetails('Education')"><i class="fas fa-graduation-cap"></i> Education</li>
            <li class="nav-item" onclick="showDetails('Albums')"><i class="fas fa-images"></i> Albums</li>
        </ul>
    </aside>

    <div class="main-content">
        <div class="welcome-banner">
            <div class="welcome-text"><h2>Hello, Jilan</h2><p>Manage your digital universe here.</p></div>
            <i class="fas fa-gamepad" style="font-size: 40px;"></i>
        </div>

        <div id="home-page" class="page active">
            <div style="background: rgba(255,255,255,0.9); padding: 40px; border-radius: 25px; text-align: center;">
                <h2>ABOUT JILAN</h2>
                <p style="margin-top: 15px;">Welcome to the dashboard. Click on Social to see your accounts.</p>
            </div>
        </div>

        <div id="detail-page" class="page">
            <h2 id="page-title" style="color: #fff; text-shadow: 0 0 10px var(--accent-blue);">DETAILS</h2>
            <div class="sub-frame-grid" id="sub-frames"></div>
            <button onclick="showPage('home')" class="back-btn">Back to Home</button>
        </div>
    </div>

    <script>
        // আপনার অ্যাকাউন্টের লিঙ্কগুলো এখানে দিন
        const socialLinks = {
            'Facebook': { url: 'https://facebook.com', icon: 'fa-facebook' },
            'WhatsApp': { url: 'https://wa.me', icon: 'fa-whatsapp' },
            'Instagram': { url: 'https://instagram.com', icon: 'fa-instagram' },
            'Twitter': { url: 'https://twitter.com', icon: 'fa-twitter' },
            'YouTube': { url: 'https://youtube.com', icon: 'fa-youtube' }
        };

        const otherData = {
            'Relatives': ['Family Tree', 'Events', 'Contacts'],
            'Education': ['Certificates', 'Skills', 'Schooling'],
            'Albums': ['Gaming', 'Personal', 'Trips']
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
        }

        function showSocial() {
            showPage('detail');
            document.getElementById('page-title').innerText = "SOCIAL MEDIA";
            const grid = document.getElementById('sub-frames');
            grid.innerHTML = ''; 

            Object.keys(socialLinks).forEach(name => {
                const linkData = socialLinks[name];
                const card = document.createElement('a');
                card.href = linkData.url;
                card.target = "_blank"; // নতুন ট্যাবে খুলবে
                card.className = 'social-card';
                card.innerHTML = `<i class="fab ${linkData.icon}"></i><h3>${name}</h3><p>Visit Profile</p>`;
                grid.appendChild(card);
            });
        }

        function showDetails(category) {
            showPage('detail');
            document.getElementById('page-title').innerText = category.toUpperCase();
            const grid = document.getElementById('sub-frames');
            grid.innerHTML = ''; 
            otherData[category].forEach(item => {
                const div = document.createElement('div');
                div.className = 'social-card'; // Reuse style
                div.innerHTML = `<i class="fas fa-star" style="color: #3b82f6"></i><h3>${item}</h3><p>View Info</p>`;
                grid.appendChild(div);
            });
        }

        // Background Particles
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.v=Math.random()*0.5; }
            draw(){ ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x,this.y,1.5,0,Math.PI*2); ctx.fill(); }
            update(){ this.y -= this.v; if(this.y<0) this.y=canvas.height; }
        }
        for(let i=0;i<50;i++) particles.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.draw();p.update();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
