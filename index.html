<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Spider-Man Gaming Portfolio</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://unpkg.com" rel="stylesheet">
    
    <style>
        :root { --spidey-red: #e62429; --spidey-blue: #005a9c; --dark: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Bebas Neue', sans-serif; cursor: none; }
        
        body { background: var(--dark); color: white; overflow-x: hidden; }

        /*--- 1. Spider-Man Video/Animated Background ---*/
        .bg-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
            filter: grayscale(30%) contrast(120%);
        }

        /*--- 2. Moving Spider Follower (Mouse Effect) ---*/
        #spider-cursor {
            position: fixed;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 9999;
            transition: 0.1s;
        }

        /*--- 3. Gaming Logo (Top Left) ---*/
        .gaming-logo {
            position: fixed;
            top: 20px; left: 20px;
            width: 80px; height: 80px;
            border: 3px solid var(--spidey-red);
            box-shadow: 0 0 20px var(--spidey-red);
            border-radius: 15px;
            z-index: 1000;
            overflow: hidden;
            background: #000;
        }
        .gaming-logo img { width: 100%; height: 100%; object-fit: cover; }

        /*--- 4. Hero Section ---*/
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(0,0,0,0.5);
        }

        .profile-box {
            width: 200px; height: 200px;
            border: 4px solid var(--spidey-red);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 30px var(--spidey-red);
            margin-bottom: 20px;
            animation: web-swing 4s ease-in-out infinite;
        }
        .profile-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        @keyframes web-swing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        h1 { font-size: 5rem; text-transform: uppercase; color: var(--spidey-red); text-shadow: 3px 3px #000; }
        p { font-size: 1.5rem; letter-spacing: 2px; }

        /*--- Cards ---*/
        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: rgba(230, 36, 41, 0.1); 
            border: 1px solid var(--spidey-red); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }
        .card:hover { transform: scale(1.05); background: var(--spidey-red); color: white; }
        .card i { font-size: 50px; margin-bottom: 15px; }

    </style>
</head>
<body>

    <!-- Spider Follower Image (মাউসের সাথে ঘুরবে) -->
    <img src="https://icons8.com" id="spider-cursor" alt="spider">

    <!-- Background Animation (Spider-Man Theme) -->
    <img class="bg-video" src="https://wallpapers.com" alt="Spidey Background">

    <div class="gaming-logo">
        <img src="logo.png" alt="Logo"> <!-- এখানে আপনার লোগোর নাম দিন -->
    </div>

    <section class="hero">
        <div class="profile-box" data-aos="zoom-in">
            <img src="my-pic.jpg" alt="Jilan"> <!-- এখানে আপনার ছবির নাম দিন -->
        </div>
        <h1 data-aos="fade-down">JILAN THE GAMER</h1>
        <p data-aos="fade-up">"With Great Power Comes Great Gaming"</p>
    </section>

    <div class="container">
        <div class="grid">
            <div class="card" data-aos="flip-left">
                <i class="fas fa-spider"></i>
                <h3>Skills</h3>
                <p>Web Dev & Pro Gaming</p>
            </div>
            <div class="card" data-aos="flip-up" data-aos-delay="200">
                <i class="fas fa-mask"></i>
                <h3>Identity</h3>
                <p>Monaemul Islam Jilan</p>
            </div>
            <div class="card" data-aos="flip-right" data-aos-delay="400">
                <i class="fab fa-facebook"></i>
                <h3>Facebook</h3>
                <a href="https://facebook.com" target="_blank" style="color:white; text-decoration:none;">Visit Profile</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init();

        // Spider Mouse Tracker Script
        const spider = document.getElementById('spider-cursor');
        document.addEventListener('mousemove', (e) => {
            spider.style.left = e.clientX + 'px';
            spider.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
