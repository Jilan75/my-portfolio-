<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Spidey Portfolio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://unpkg.com" rel="stylesheet">
    
    <style>
        :root { --spidey-red: #ff0000; --dark-bg: #0b0f1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark-bg); color: white; overflow: hidden; } /* লোড হওয়ার আগে স্ক্রল বন্ধ */

        /*--- 1. Preloader Animation (Intro) ---*/
        #loader {
            position: fixed;
            width: 100%; height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 1s ease-out;
        }
        .loader-spider {
            font-size: 80px;
            color: var(--spidey-red);
            animation: web-drop 2s ease-in-out infinite;
        }
        @keyframes web-drop {
            0% { transform: translateY(-200px); opacity: 0; }
            50% { transform: translateY(0); opacity: 1; text-shadow: 0 0 20px var(--spidey-red); }
            100% { transform: translateY(200px); opacity: 0; }
        }
        #loader h2 { margin-top: 20px; letter-spacing: 5px; color: white; text-transform: uppercase; }

        /*--- 2. Main Content (Initially Hidden) ---*/
        #main-content { opacity: 0; transition: 2s; }

        /*--- 3. Background Web Effect ---*/
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }

        /*--- 4. UI Elements ---*/
        .gaming-logo {
            position: fixed; top: 20px; left: 20px;
            width: 70px; height: 70px;
            border: 2px solid var(--spidey-red);
            box-shadow: 0 0 15px var(--spidey-red);
            border-radius: 12px; z-index: 1000; overflow: hidden; background: #000;
        }
        .gaming-logo img { width: 100%; height: 100%; object-fit: cover; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .profile-container {
            width: 180px; height: 180px;
            border: 4px solid var(--spidey-red);
            border-radius: 50%; padding: 5px; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            animation: float 3s ease-in-out infinite;
        }
        .profile-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { font-size: 3.5rem; text-shadow: 0 0 10px var(--spidey-red); }
        h1 span { color: var(--spidey-red); }

        .container { max-width: 1100px; margin: -50px auto 50px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px); padding: 35px; border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.1); text-align: center; transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--spidey-red); }
        .card i { font-size: 45px; color: var(--spidey-red); margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- 1. Intro Loader -->
    <div id="loader">
        <div class="loader-spider"><i class="fas fa-spider"></i></div>
        <h2>Jilan is Coming...</h2>
    </div>

    <!-- 2. Main Site Content -->
    <div id="main-content">
        <div id="particles-js"></div>

        <div class="gaming-logo">
            <img src="logo.png" alt="Logo">
        </div>

        <section class="hero">
            <div class="profile-container">
                <img src="my-pic.jpg" alt="Jilan">
            </div>
            <h1 data-aos="zoom-in">Hello, I'm <span>Jilan</span></h1>
            <p data-aos="fade-up">GAMER | SPIDEY | DEVELOPER</p>
        </section>

        <div class="container">
            <div class="grid">
                <div class="card" data-aos="flip-left"><i class="fas fa-spider"></i><h3>Agility</h3><p>Speed & Accuracy.</p></div>
                <div class="card" data-aos="flip-up"><i class="fas fa-gamepad"></i><h3>Gaming</h3><p>Pro Skills.</p></div>
                <div class="card" data-aos="flip-right"><i class="fas fa-code"></i><h3>Dev</h3><p>Clean Code.</p></div>
            </div>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
    <script>
        // Loader Script
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').style.opacity = '1';
                    document.body.style.overflow = 'auto'; // স্ক্রল চালু
                    AOS.init({ duration: 1000 });
                }, 1000);
            }, 3000); // ৩ সেকেন্ড পর লোডার বন্ধ হবে
        };

        // Red Web Particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 120 },
                color: { value: '#ff0000' },
                shape: { type: 'circle' },
                opacity: { value: 0.6 },
                size: { value: 3 },
                line_linked: { enable: true, distance: 150, color: '#ff0000', opacity: 0.4, width: 1.5 },
                move: { enable: true, speed: 3 }
            },
            interactivity: { events: { onhover: { enable: true, mode: 'grab' } } }
        });
    </script>
</body>
</html>
