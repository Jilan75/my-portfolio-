<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Dashboard</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .welcome-banner { background: linear-gradient(to right, #4a4e69, #22223b); color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        /* আপনার ছবির মত কার্ড ডিজাইন */
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid #007bff; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 50px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; font-size: 18px; color: #333; }
        
        .social-btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 10px; margin-top: 10px; border-radius: 8px; font-weight: bold; }
        .insta { background: #e1306c; }
    </style>
</head>
<body>

    <div class="welcome-banner">
        <h2>Hello, Monaemul Islam Jilan</h2>
        <p>Welcome to my personal dashboard portfolio!</p>
    </div>

    <div class="grid-container">
        <!-- Profile Card -->
        <div class="card" style="border-top-color: #6c5ce7;">
            <img src="your-pic.jpg" style="width: 80px; border-radius: 50%;" alt="Me">
            <h3>My Profile</h3>
            <p>Dhaka, Bangladesh</p>
        </div>

        <!-- Hobby Card -->
        <div class="card" style="border-top-color: #00b894;">
            <h3>Hobbies</h3>
            <p>Coding, Travel & Music</p>
        </div>

        <!-- Facebook Card -->
        <div class="card" style="border-top-color: #0984e3;">
            <h3>Facebook</h3>
            <a href="https://facebook.com" target="_blank" class="social-btn">Visit Profile</a>
        </div>

        <!-- Instagram Card -->
        <div class="card" style="border-top-color: #fd79a8;">
            <h3>Instagram</h3>
            <a href="https://instagram.com" target="_blank" class="social-btn insta">Follow Me</a>
        </div>
    </div>

</body>
</html>
