<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Dream Gamerz</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root { 
            --primary-bg: #f0f4f9;
            --sidebar-bg: #e2e8f0;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-main: #1e293b;
            --card-white: rgba(255, 255, 255, 0.9);
            --gradient-main: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main); 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /*--- Sidebar Styles ---*/
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .profile-section {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: #fff;
            margin: 0 auto 10px;
            border: 3px solid var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-menu { list-style: none; flex: 1; }
        .nav-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #475569;
            text-transform: capitalize;
        }
        .nav-item.active, .nav-item:hover {
            background: #fff;
            color: var(--accent-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /*--- Main Content Area ---*/
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }

        .welcome-banner {
            background: var(--gradient-main);
            padding: 30px;
            border-radius: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2);
            animation: slideDown 0.8s ease-out;
        }

        /* Pages */
        .page { display: none; animation: fadeIn 0.5s ease-in-out forwards; width: 100%; }
        .page.active { display: flex; flex-direction: column; gap: 20px; }

        .about-frame {
            background: var(--card-white);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.4s;
        }

        /* Sub-frames grid */
        .sub-frame-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .sub-card {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--accent-blue);
            transition: 0.3s;
        }
        .sub-card:hover { transform: translateY(-5px); background: var(--accent-blue); color: #fff; }

        .gaming-id-section { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px; }
        .id-boxes { display: flex; gap: 12px; }
        .id-box { width: 35px; height: 35px; background: #fff; border: 2px solid var(--accent-blue); border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .id-box:hover { background: var(--accent-blue); transform: scale(1.1) rotate(5deg); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-img"><i class="fas fa-user-ninja" style="font-size: 30px; color: var(--accent-blue);"></i></div>
            <h3>Monaemul Islam</h3>
            <p style="font-size: 12px; opacity: 0.7;">Dream Gamer</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showPage('home')"><i class="fas fa-th-large"></i> Dashboard</li>
            <li class="nav-item" onclick="showDetails('Relatives')"><i class="fas fa-heart"></i> Relatives</li>
            <li class="nav-item" onclick="showDetails('Education')"><i class="fas fa-graduation-cap"></i> Education</li>
            <li class="nav-item" onclick="showDetails('Albums')"><i class="fas fa-images"></i> Albums</li>
            <li class="nav-item" onclick="showDetails('Friends')"><i class="fas fa-users"></i> Friends</li>
        </ul>
    </aside>

    <div class="main-content">
        <div class="welcome-banner">
            <div>
                <h2>Hey, welcome to my battle</h2>
                <p style="opacity: 0.8; margin-top: 5px;">Wanna defeat me?</p>
            </div>
            <i class="fas fa-gamepad" style="font-size: 40px; color: #fff;"></i>
        </div>

        <!-- Home Page -->
        <div id="home-page" class="page active">
            <main class="about-frame">
                <h2 style="color: var(--accent-blue); margin-bottom: 15px;">Its JILAN</h2>
                <p style="color: #64748b; line-height: 1.8;">
                    "A noob gamer dominating the battlefield with zero skills, exploring something new and curious about the unknown."
                </p>
                <div class="gaming-id-section">
                    <div class="id-boxes"><div class="id-box"></div><div class="id-box"></div><div class="id-box"></div><div class="id-box"></div><div class="id-box"></div></div>
                    <div class="label-text" style="font-weight: bold; color: var(--accent-blue); margin-top: 10px;">GAMING ID</div>
                </div>
            </main>
        </div>

        <!-- Detail Page -->
        <div id="detail-page" class="page">
            <h2 id="page-title" style="color: var(--accent-blue);">DETAILS</h2>
            <div class="sub-frame-grid" id="sub-frames"></div>
            <button onclick="showPage('home')" style="margin-top: 20px; padding: 10px 20px; cursor: pointer; background: var(--accent-blue); color: #fff; border: none; border-radius: 5px;">Back to Dashboard</button>
        </div>
    </div>

    <script>
        const pagesData = {
            'Relatives': ['Family Tree', 'Events', 'Contacts'],
            'Education': ['Schooling', 'Certificates', 'Skills'],
            'Albums': ['Gaming Highlights', 'Personal', 'Tournaments'],
            'Friends': ['Team Alpha', 'Steam Buds', 'Discord Squad']
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            
            // Sidebar active state change
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if(pageId === 'home') document.querySelector('.nav-item').classList.add('active');
        }

        function showDetails(category) {
            showPage('detail');
            document.getElementById('page-title').innerText = category.toUpperCase();
            const grid = document.getElementById('sub-frames');
            grid.innerHTML = ''; 

            pagesData[category].forEach(item => {
                const card = document.createElement('div');
                card.className = 'sub-card';
                card.innerHTML = `<i class="fas fa-star" style="margin-bottom:10px;"></i><h3>${item}</h3><p>View Info</p>`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
