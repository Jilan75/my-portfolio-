<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jilan | Ultimate Gaming Multiverse</title>
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>/*--- ঝুলন্ত মাকড়সা অ্যানিমেশন ---*/
.hanging-spider {
    position: fixed; top: -50px; z-index: 1000;
    display: flex; flex-direction: column; align-items: center;
    animation: swing 4s ease-in-out infinite;
}
.web-line { width: 1px; height: 180px; background: rgba(255, 255, 255, 0.4); }
.spider-icon {
    font-size: 35px; color: #ff0055;
    filter: drop-shadow(0 0 10px #ff0055);
    animation: glow 2s ease-in-out infinite;
}
@keyframes swing {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(40px) rotate(8deg); }
}
@keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 5px #ff0055); transform: scale(1); }
    50% { filter: drop-shadow(0 0 20px #ff0055); transform: scale(1.1); }
}
/*--- Dream Gamer Card Special Animation ---*/
.dream-card {
    background: #000;
    border-radius: 25px;
    padding: 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 2px solid #00d2ff; /* নীল বর্ডার */
    transition: 0.5s;
    box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
}

/* মাউস নিলে বর্ডার জ্বলবে এবং কার্ডটি বড় হবে */
.dream-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 30px #00d2ff;
    border-color: #fff;
}

/* কার্ডের ভেতরের টেক্সট স্টাইল */
.dream-card h2 {
    font-size: 28px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.dream-card p {
    font-size: 16px;
    color: #00d2ff;
    opacity: 0.8;
}

/* সাইডের নীল ইফেক্ট (আপনার ছবির মতো) */
.dream-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.4), transparent);
    transition: 0.5s;
}

.dream-card:hover::before {
    left: 100%;
}

        :root { 
            --neon-blue: #00d2ff; 
            --neon-red: #ff0055; 
            --dark-bg: #020617; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; cursor: crosshair; }
        
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        /*--- 1. Cyberpunk Background Particles ---*/
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        /*--- 2. Neon Hanging Spiders ---*/
        .hanging-spider { position: fixed; top: -10px; z-index: 100; animation: swing 5s ease-in-out infinite; }
        .web-line { width: 1.5px; height: 180px; background: linear-gradient(to bottom, transparent, var(--neon-blue)); margin: 0 auto; }
        .spider-icon { 
            font-size: 35px; color: var(--neon-red); 
            filter: drop-shadow(0 0 15px var(--neon-red)); 
            animation: pulse 2s infinite;
        }

        @keyframes swing { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        /*--- 3. Gaming Sidebar (Glow Effect) ---*/
        .sidebar { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .side-item { 
            width: 55px; height: 55px; border-radius: 15px; background: #000; 
            border: 2px solid var(--neon-blue); cursor: pointer; transition: 0.4s; overflow: hidden;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .side-item:hover { transform: scale(1.2) rotate(10deg); box-shadow: 0 0 25px var(--neon-blue); border-color: white; }
        .side-item img { width: 100%; height: 100%; object-fit: cover; }

        /*--- 4. Animated Gaming Header (Your Photo) ---*/
        .header-box {
            width: 90%; max-width: 1100px; margin: 40px auto;
            background: linear-gradient(90deg, rgba(0,210,255,0.1), rgba(255,0,85,0.1));
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .user-text h2 { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-blue); }
        .user-text p { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        
        /* Your Profile with Rotating Border */
        .profile-glow {
            width: 85px; height: 85px; border-radius: 50%;
            padding: 4px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-red));
            animation: rotate-border 4s linear infinite;
        }
        .profile-glow img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; }

        @keyframes rotate-border { 100% { filter: hue-rotate(360deg); } }

        /*--- 5. Gaming Dashboard Cards ---*/
        .container { max-width: 1100px; margin: 0 auto 60px; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
        .card { 
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 40px; border-radius: 25px; text-align: center;
            transition: 0.5s; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-blue));
            animation: rotate-card 4s linear infinite; opacity: 0;
        }
        .card:hover::before { opacity: 1; }
        .card:hover { transform: translateY(-15px); background: rgba(0,0,0,0.6); box-shadow: 0 0 20px var(--neon-blue); }
        
        .card-content { position: relative; z-index: 1; background: var(--dark-bg); border-radius: 20px; padding: 20px; }
        .card i { font-size: 45px; color: var(--neon-red); margin-bottom: 20px; }

        @keyframes rotate-card { 100% { transform: rotate(360deg); } }

        /*--- 6. Typing Intro Text ---*/
        .typing-container { font-size: 1.5rem; text-align: center; margin-bottom: 20px; color: var(--neon-red); }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <!-- Dashboard Cards -->

                    <p>not peter parker.</p>

    <!-- External Scripts -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
    <script>
        // AOS Animation
        AOS.init({ duration: 1200 });

        // Typing Effect
        const text = "MONAEMUL ISLAM JILAN";
        let idx = 0;
        function type() {
            if (idx < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(idx);
                idx++;
                setTimeout(type, 150);
            }
        }
        window.onload = type;

        // Particle Background (Neon Web)
        particlesJS('particles-js', {
            particles: {
                number: { value: 90 },
                color: { value: '#00d2ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.3 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: '#ff0055', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 3 }
            }
        });

        function copyID(id) {
            navigator.clipboard.writeText(id);
            alert("Gaming ID Copied: " + id);
        }
    </script>
</body>
