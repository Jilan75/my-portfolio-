<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <style>
        /* This section makes your website look beautiful */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #007bff; margin-bottom: 15px; }
        
        h1 { color: #222; margin-bottom: 5px; }
        .info { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
        
        .social-links h3 { color: #333; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn { display: block; background: #007bff; color: white; margin: 12px 0; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #0056b3; transform: scale(1.02); }
        .insta { background: #E1306C; } /* Instagram Color */
        .fb { background: #1877F2; }    /* Facebook Color */
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Replace 'my-profile.jpg' with your actual photo filename -->
    <img src="jilanpic.jpg" alt="My Profile Picture">
    
    <!-- 2. Personal Information -->
    <h1>Your Full Name</h1>
    <div class="info">
        <p>📍 <b>Address:</b> Your City, Country</p>
        <p>🎨 <b>Hobbies:</b> Photography, Traveling, Music</p>
        <p><b>About Me:</b> Hello! I am a passionate individual who loves exploring new things and connecting with people.</p>
    </div>

    <!-- 3. Social Media Links -->
    <div class="social-links">
        <h3>Connect With Me</h3>
        
        <!-- Replace the '#' with your actual profile links -->
        <a href="https://facebook.com" target="_blank" class="btn fb">Facebook</a>
        <a href="https://instagram.com" target="_blank" class="btn insta">Instagram</a>
    </div>
</div>

</body>
</html>
